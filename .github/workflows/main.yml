name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build app
        run: |
          cd frontend
          npm run build

      - name: Upload build
        uses: actions/upload-artifact@v3
        with:
          name: app-build
          path: frontend/build
